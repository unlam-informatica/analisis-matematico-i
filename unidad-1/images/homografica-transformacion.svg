<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" role="img" aria-labelledby="title desc">
  <title id="title">Transformación de la función 1/x a una homográfica</title>
  <desc id="desc">Comparación entre la función recíproca y una homográfica desplazada, mostrando traslaciones horizontal y vertical.</desc>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <style>
      .axis { stroke:#374151; stroke-width:2.2; marker-end:url(#arrow); }
      .grid { stroke:#e5e7eb; stroke-width:1; }
      .dash { stroke:#ef4444; stroke-width:2.1; stroke-dasharray:8 8; }
      .curve1 { fill:none; stroke:#0ea5e9; stroke-width:3.6; }
      .curve2 { fill:none; stroke:#8b5cf6; stroke-width:3.6; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill:#111827; }
      .small { font-size: 16px; fill:#374151; }
      .accent1 { fill:#0ea5e9; }
      .accent2 { fill:#8b5cf6; }
    </style>
  </defs>

  <!-- Left panel: 1/x -->
  <g transform="translate(0,0)">
    <text class="label" x="120" y="42">1) Función recíproca</text>
    <line class="grid" x1="40" y1="250" x2="450" y2="250"/>
    <line class="grid" x1="245" y1="60" x2="245" y2="450"/>
    <line class="axis" x1="40" y1="250" x2="450" y2="250"/>
    <line class="axis" x1="245" y1="450" x2="245" y2="60"/>
    <line class="dash" x1="245" y1="60" x2="245" y2="450"/>
    <line class="dash" x1="40" y1="250" x2="450" y2="250"/>
    <path class="curve1" d="M 275 110 C 315 90, 360 95, 418 145"/>
    <path class="curve1" d="M 215 390 C 175 410, 130 405, 72 355"/>
    <text class="label accent1" x="258" y="85">x = 0</text>
    <text class="label accent1" x="332" y="242">y = 0</text>
    <text class="label small" x="205" y="270">O</text>
    <text class="label small" x="70" y="320">Ramas opuestas</text>
  </g>

  <!-- Arrow and formula -->
  <g transform="translate(450,0)">
    <line x1="35" y1="250" x2="115" y2="250" stroke="#374151" stroke-width="3.2" marker-end="url(#arrow)"/>
    <text class="label" x="14" y="225">trasladar</text>
    <text class="label" x="20" y="250">re-escalar</text>
    <text class="label" x="14" y="275">reflejar</text>
  </g>

  <!-- Right panel: 1/(x-1)+1 -->
  <g transform="translate(500,0)">
    <text class="label" x="84" y="42">2) Homográfica transformada</text>
    <line class="grid" x1="40" y1="250" x2="450" y2="250"/>
    <line class="grid" x1="245" y1="60" x2="245" y2="450"/>
    <line class="axis" x1="40" y1="250" x2="450" y2="250"/>
    <line class="axis" x1="245" y1="450" x2="245" y2="60"/>
    <line class="dash" x1="320" y1="60" x2="320" y2="450"/>
    <line class="dash" x1="40" y1="170" x2="450" y2="170"/>
    <path class="curve2" d="M 345 95 C 385 75, 425 82, 442 122"/>
    <path class="curve2" d="M 295 410 C 255 430, 210 425, 120 365"/>
    <circle cx="320" cy="170" r="5.5" fill="#111827"/>
    <text class="label accent2" x="328" y="84">x = 1</text>
    <text class="label accent2" x="332" y="162">y = 1</text>
    <text class="label small" x="305" y="190">(1, 1)</text>
    <text class="label small" x="77" y="320">Misma forma,</text>
    <text class="label small" x="77" y="342">pero desplazada</text>
  </g>

  <!-- Bottom note -->
  <text class="label small" x="205" y="482">La homográfica general se obtiene a partir de 1/x mediante traslaciones, escalas y reflexiones.</text>
</svg>
